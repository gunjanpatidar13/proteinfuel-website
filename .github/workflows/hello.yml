name: First GitHub Action

on:
  push:
    branches:
      - main

jobs:
  first-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Message
        run: echo "Jai Shri Ram 🚩"

      - name: Check Python Version
        run: python3 --version

      - name: Show Current Directory
        run: pwd

      - name: List Files
        run: ls -la